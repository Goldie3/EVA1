<!DOCTYPE html>
<html lang="es">
<link rel="stylesheet" href="styles.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estacion Arcade</title>
    <link rel="stylesheet" href="styles.css">
</head>
<header>
    <h3>Estacion Arcade - ¡Tu entretención total!</h3>
</header>

<body>

    <h2>Juegos de la semana</h2>
    <div class="contenedorbotones">
        <button class="botonMirar" data-video="DBLTrailer.mp4">
            <img class="previewImg" src="pagina/videos/DBLTrailerpreview.jpg">
            <img class="mirarVideo" src="pagina/videos/mirarvideo.png">
        </button>
        <button class="botonMirar" data-video="DokkanTrailer.mp4">
            <img class="previewImg" src="pagina/videos/DokkanTrailepreview.jpg">
            <img class="mirarVideo" src="pagina/videos/mirarvideo.png">
        </button>
        <button class="botonMirar" data-video="https://www.youtube.com/embed/xta6lc0-5lE?si=uOQclK6Ki3W3fnGg"
            data-type="youtube">
            <img class="previewImg" src="pagina/videos/DBGSTrailerpreview.jpg">
            <img class="mirarVideo" src="pagina/videos/mirarvideo.png">
        </button>
    </div>

    <h2>Nuestros productos</h2>

    <div class="imagenesproductos">
        <img src="pagina/imagenes/ninswitch2.avif" alt="Nintendo Switch 2">
        <img src="pagina/imagenes/steamdeck.webp" alt="Steam Deck">
        <img src="pagina/imagenes/ps5.webp" alt="PlayStation 5">
    </div>

    <div class="fondovisualizador">
        <div id="miUiVisualizador" class="uivisualizador">

            <div class="visualizador">
                <span class="cerrar">&times;</span>
                <video class="video" width="720" height="840" controls style="display: none;">
                </video>
                <div class="youtube-wrapper" style="display: none;">
                    <iframe class="videoYoutube" width="720" height="840" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
<footer>
    <p>©2026 Empresa de Video Juegos. Todos los derechos reservados.</p>
</footer>

</html>
